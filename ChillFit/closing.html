<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | ChillFit Collection</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .closing-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-bg);
            padding: 40px;
        }
        
        .closing-card {
            display: flex;
            background: white;
            max-width: 1100px;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            animation: fadeIn 1s ease-out;
        }
        
        .closing-image {
            flex: 1.2;
        }
        
        .closing-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .closing-content {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }
        
        .closing-content h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--dark-brown);
        }
        
        .closing-content p {
            font-family: var(--font-brand);
            font-style: italic;
            font-size: 1.3rem;
            color: var(--accent-brown);
            margin-bottom: 40px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 992px) {
            .closing-card {
                flex-direction: column;
            }
            .closing-image {
                height: 300px;
            }
            .closing-content {
                padding: 40px;
                text-align: center;
            }
            .closing-content h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <a href="index.html"><img src="image/logo.2png.jpeg" alt="ChillFit Logo"></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="closing.html">Penutup</a></li>
        </ul>
    </nav>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/6282115940917" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <main class="closing-page">
        <div class="closing-card">
            <div class="closing-content">
                <h1 class="brand-name">Thank you for choosing ChillFit.</h1>
                <p>"Where comfort meets effortless elegance."</p>
                <a href="index.html" class="btn btn-outline">Back to Home</a>
            </div>
            <div class="closing-image">
                <img src="image/waw.png.jpg" alt="Thank You ChillFit">
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="copyright">&copy; 2024 ChillFit Collection. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
